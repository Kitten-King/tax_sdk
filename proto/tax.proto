syntax = "proto3";

package tax;

option go_package = "github.com/Kitten-King/tax_sdk/pb";

service TaxService {
  rpc CalculateTripTax (TaxRequest) returns (TaxResponse);
}

message TaxRequest {
  int32 city_id = 1;
  int64 trip_duration_seconds = 2;
}

message TaxResponse {
  double tax_amount = 1;
  double tax_rate = 2;
}